version: "2"
# golangci-lint configuration
# See: https://golangci-lint.readthedocs.io/

run:
  timeout: 10m
  tests: false
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - unconvert
    - gocritic

formatters:
  enable:
    - gofmt
    - goimports

linters.settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  gocritic:
    enabled-tags:
      - diagnostic
      - performance

  gofmt:
    simplify: true

  goimports:
    local-prefixes: runic

  misspell:
    locale: US

  staticcheck:
    checks:
      - all
      - -SA1009

issues:
  exclude:
    - linters: [gocritic]
      path: _test\.go
    - linters: [all]
      path: _generated\.go
    - linters: [all]
      path: vendor/
