name: Bump Agent Version

on:
  push:
    branches: [main]
    paths:
      - 'internal/agent/**'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump agent version
        run: |
          # Get current version
          CURRENT=$(cat .agent-version 2>/dev/null || echo "0.0.0")
          
          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          # Increment minor version, reset patch
          NEW_VERSION="$MAJOR.$((MINOR+1)).0"
          
          # Write new version
          echo "$NEW_VERSION" > .agent-version
          echo "Bumping agent version: $CURRENT -> $NEW_VERSION"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit the version bump
          git add .agent-version
          git commit -m "chore: bump agent version to $NEW_VERSION [skip ci]"
          git push

      - name: Create summary
        run: |
          NEW_VERSION=$(cat .agent-version)
          echo "### Agent Version Bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "New version: \`$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY
