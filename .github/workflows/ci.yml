name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pipeline:
    name: Test, Lint, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Unified Setup
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true # GitHub handles cleanup automatically here

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # 2. Frontend Build (Once)
      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      # 3. Test Phase
      - name: Run tests
        run: |
          go mod tidy
          go vet ./...
          go test -race -cover ./internal/...

      - name: Build all packages
        run: go build ./...

      # 4. Lint Phase
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.7.2

      # 5. Build Phase
      - name: Build Go binary
        run: |
          CGO_ENABLED=1 go build -ldflags="-X runic/internal/common/version.Version=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" -o runic ./cmd/runic-server