name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'web/**'

  frontend:
    needs: changes
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache frontend build
        id: cache-dist
        uses: actions/cache@v4
        with:
          path: internal/api/web/dist/
          # This key creates a unique fingerprint of your frontend source code.
          # Adjust the paths inside hashFiles() if your source code lives elsewhere!
          key: ${{ runner.os }}-frontend-dist-${{ hashFiles('web/src/**', 'web/index.html', 'web/package-lock.json', 'web/*.config.*') }}

      - name: Set up Node.js
        if: steps.cache-dist.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build
        if: steps.cache-dist.outputs.cache-hit != 'true'
        run: |
          cd web
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/api/web/dist/
          retention-days: 1

  frontend-test:
    needs: [changes, frontend]
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests with coverage
        working-directory: web
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: web/coverage/
          retention-days: 7

  backend:
    needs: [changes, frontend]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    name: Test and Build Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/api/web/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
          cache-dependency-path: go.sum
      
      - name: Run tests
        run: |
          go mod tidy
          go vet ./...
          go test -race -cover ./internal/...
      
      - name: Build all packages
        run: go build ./...

      - name: Build Go binary
        run: |
          CGO_ENABLED=1 go build -ldflags="-X runic/internal/common/version.Version=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" -o runic ./cmd/runic-server

  lint:
    needs: [changes, frontend]
    if: ${{ needs.changes.outputs.backend == 'true' }}
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/api/web/dist/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: false # Lint action has its own cache logic

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
