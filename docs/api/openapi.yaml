                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agent/heartbeat:
    get:
      tags:
      - Agent
      summary: Agent heartbeat (GET)
      description: Agent heartbeat signal to indicate it is still alive.
      operationId: agentHeartbeatGet
      responses:
        '200':
          description: Heartbeat acknowledged
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - Agent
      summary: Agent heartbeat (POST)
      description: Agent heartbeat signal with optional status payload.
      operationId: agentHeartbeatPost
      responses:
        '200':
          description: Heartbeat acknowledged
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agent/logs:
    post:
      tags:
      - Agent
      summary: Submit firewall logs
      description: Agent submits firewall log entries to the server.
      operationId: agentSubmitLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/FirewallLog'
      responses:
        '200':
          description: Logs accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "logs accepted"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agent/backup/{host_id}:
    post:
      tags:
      - Agent
      summary: Submit rules backup
      description: Agent submits a backup of its current iptables rules.
      operationId: agentSubmitBackup
      parameters:
      - name: host_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Backup accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agent/bundle/{host_id}/applied:
    post:
      tags:
      - Agent
      summary: Confirm bundle applied
      description: Agent confirms that the bundle was successfully applied.
      operationId: agentConfirmBundleApplied
      parameters:
      - name: host_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Confirmation acknowledged
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agent/events/{host_id}:
    get:
      tags:
      - Agent
      summary: Stream agent SSE events
      description: Opens an SSE connection for the agent to receive real-time server events.
      operationId: agentStreamEvents
      parameters:
      - name: host_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: SSE stream started
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agent/test-key:
    post:
      tags:
      - Agent
      summary: Test agent key
      description: Tests if the agent's authentication key is valid.
      operationId: agentTestKey
      responses:
        '200':
          description: Key is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agent/check-rotation:
    get:
      tags:
      - Agent
      summary: Check key rotation
      description: Checks if a key rotation is pending for this agent.
      operationId: agentCheckRotation
      responses:
        '200':
          description: Rotation check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  rotation_pending:
                    type: boolean
                  new_key:
                    type: string
                    description: New key if rotation is pending
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agent/rotate-key:
    post:
      tags:
      - Agent
      summary: Rotate agent key
      description: |
        Initiates or completes a key rotation for an agent.
        Authenticated via rotation token (not JWT).
      operationId: agentRotateKey
      responses:
        '200':
          description: Key rotation processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /agent/confirm-rotation:
    post:
      tags:
      - Agent
      summary: Confirm key rotation
      description: Confirms that the agent has applied the rotated key.
      operationId: agentConfirmRotation
      responses:
        '200':
          description: Rotation confirmed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

  schemas:
    # Peers
    Peer:
      type: object
      properties:
        id:
          type: integer
          format: int64
        hostname:
          type: string
        ip_address:
          type: string
          format: ipv4
        os_type:
          type: string
          enum: [debian, ubuntu, rhel, arch, opensuse, raspbian, linux]
        arch:
          type: string
          enum: [amd64, arm64, arm, armv6]
        has_docker:
          type: boolean
        is_manual:
          type: boolean
        agent_version:
          type: string
        last_heartbeat:
          type: string
          format: date-time
        groups:
          type: string
          description: Comma-separated group names
        status:
          type: string
          enum: [online, offline, pending]
        bundle_version:
          type: string
        bundle_version_number:
          type: integer
        description:
          type: string
        hmac_key_last_rotated_at:
          type: string
          format: date-time
        pending_changes_count:
          type: integer

    CreatePeerRequest:
      type: object
      required:
        - hostname
        - ip_address
      properties:
        hostname:
          type: string
          maxLength: 253
          description: Hostname (1-253 chars, alphanumeric with hyphens and dots)
        ip_address:
          type: string
          format: ipv4
          description: IPv4 address
        os_type:
          type: string
          enum: [debian, ubuntu, rhel, arch, opensuse, raspbian, linux]
        arch:
          type: string
          enum: [amd64, arm64, arm, armv6]
        agent_key:
          type: string
          description: Agent key (required for agent peers, optional for manual peers)
        has_docker:
          type: boolean
          default: false
        is_manual:
          type: boolean
          default: false

    UpdatePeerRequest:
      type: object
      properties:
        hostname:
          type: string
          maxLength: 253
        ip_address:
          type: string
          format: ipv4
        os_type:
          type: string
          enum: [debian, ubuntu, rhel, arch, opensuse, raspbian, linux]
        arch:
          type: string
          enum: [amd64, arm64, arm, armv6]
        has_docker:
          type: boolean
        description:
          type: string

    # Groups
    Group:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        peer_count:
          type: integer
        policy_count:
          type: integer

    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          description: Group name (1-100 chars, alphanumeric with underscore/hyphen/space)
        description:
          type: string

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string

    # Services
    Service:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        ports:
          type: string
          description: Destination ports (e.g., "80,443" or "8000:9000")
        source_ports:
          type: string
          description: Source ports
        protocol:
          type: string
          enum: [tcp, udp, both, icmp, igmp]
        is_system:
          type: boolean

    CreateServiceRequest:
      type: object
      required:
        - name
        - ports
        - protocol
      properties:
        name:
          type: string
          maxLength: 100
          description: Service name
        description:
          type: string
        ports:
          type: string
          description: Destination ports (comma/colon-separated)
        source_ports:
          type: string
          description: Source ports (comma/colon-separated)
        protocol:
          type: string
          enum: [tcp, udp, both]
          description: Protocol (tcp, udp, or both)

    UpdateServiceRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        ports:
          type: string
        source_ports:
          type: string
        protocol:
          type: string
          enum: [tcp, udp, both, icmp, igmp]

    # Policies
    Policy:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        source_id:
          type: integer
          format: int64
        source_type:
          type: string
          enum: [peer, group, special]
        service_id:
          type: integer
          format: int64
        target_id:
          type: integer
          format: int64
        target_type:
          type: string
          enum: [peer, group, special]
        action:
          type: string
          enum: [ACCEPT, DROP, LOG_DROP]
        priority:
          type: integer
        enabled:
          type: boolean
        target_scope:
          type: string
          enum: [both, host, docker]
        direction:
          type: string
          enum: [both, forward, backward]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePolicyRequest:
      type: object
      required:
        - name
        - source_id
        - source_type
        - service_id
        - target_id
        - target_type
        - action
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        source_id:
          type: integer
          format: int64
        source_type:
          type: string
          enum: [peer, group, special]
        service_id:
          type: integer
          format: int64
        target_id:
          type: integer
          format: int64
        target_type:
          type: string
          enum: [peer, group, special]
        action:
          type: string
          enum: [ACCEPT, DROP, LOG_DROP]
        priority:
          type: integer
          default: 1000
        enabled:
          type: boolean
          default: true
        target_scope:
          type: string
          enum: [both, host, docker]
          default: both
        direction:
          type: string
          enum: [both, forward, backward]
          default: both

    UpdatePolicyRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
        source_id:
          type: integer
          format: int64
        source_type:
          type: string
          enum: [peer, group, special]
        service_id:
          type: integer
          format: int64
        target_id:
          type: integer
          format: int64
        target_type:
          type: string
          enum: [peer, group, special]
        action:
          type: string
          enum: [ACCEPT, DROP, LOG_DROP]
        priority:
          type: integer
        enabled:
          type: boolean
        target_scope:
          type: string
          enum: [both, host, docker]
        direction:
          type: string
          enum: [both, forward, backward]

    # Auth
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    # Dashboard
    DashboardStats:
      type: object
      properties:
        total_peers:
          type: integer
        online_peers:
          type: integer
        offline_peers:
          type: integer
        manual_peers:
          type: integer
        total_policies:
          type: integer
        blocked_last_hour:
          type: integer
        blocked_last_24h:
          type: integer
        recent_activity:
          type: array
          items:
            $ref: '#/components/schemas/ActivityItem'
        peer_health:
          type: array
          items:
            $ref: '#/components/schemas/PeerHealth'
        top_blocked_sources:
          type: array
          items:
            $ref: '#/components/schemas/BlockedIP'

    ActivityItem:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        src_ip:
          type: string
          format: ipv4
        dst_ip:
          type: string
          format: ipv4
        protocol:
          type: string
        action:
          type: string
        hostname:
          type: string

    PeerHealth:
      type: object
      properties:
        hostname:
          type: string
        ip_address:
          type: string
        agent_version:
          type: string
        last_heartbeat:
          type: string
          format: date-time
        is_online:
          type: boolean
        is_manual:
          type: boolean

    BlockedIP:
      type: object
      properties:
        src_ip:
          type: string
        count:
          type: integer

    FirewallLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        src_ip:
          type: string
        dst_ip:
          type: string
        protocol:
          type: string
        src_port:
          type: integer
        dst_port:
          type: integer
        action:
          type: string
        hostname:
          type: string

    # Pending Changes
    PendingChangeGroup:
      type: object
      properties:
        peer_id:
          type: integer
          format: int64
        hostname:
          type: string
        ip_address:
          type: string
        changes_count:
          type: integer
        changes:
          type: array
          items:
            $ref: '#/components/schemas/PendingChangeDetail'

    PendingChangeDetail:
      type: object
      properties:
        id:
          type: integer
          format: int64
        change_type:
          type: string
        change_id:
          type: integer
          format: int64
        change_action:
          type: string
        change_summary:
          type: string
        created_at:
          type: string
          format: date-time

    # Peer IPs
    PeerIP:
      type: object
      properties:
        id:
          type: integer
          format: int64
        peer_id:
          type: integer
          format: int64
        ip_address:
          type: string
          format: ipv4
        is_primary:
          type: boolean

    AddPeerIPRequest:
      type: object
      required:
      - ip_address
      properties:
        ip_address:
          type: string
          format: ipv4
          description: IPv4 address to add
        is_primary:
          type: boolean
          default: false
          description: Whether this IP should be the primary address

    # Setup
    SetupStatus:
      type: object
      properties:
        needs_setup:
          type: boolean
          description: True if no users exist yet (initial setup required)

    SetupRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          description: Admin username for initial setup
        password:
          type: string
          format: password
          description: Admin password for initial setup

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token (set as cookie)
        username:
          type: string
        is_setup:
          type: boolean
          description: True if this was created during initial setup

    UserInfo:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
          enum: [admin, editor, viewer]

    # System Info
    SystemInfo:
      type: object
      properties:
        version:
          type: string
          description: Server version
        commit:
          type: string
          description: Git commit hash
        built_at:
          type: string
          description: Build timestamp
        latest_agent_version:
          type: string
          description: Latest available agent version

    # Users
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, editor, viewer]
        created_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, editor, viewer]

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, editor, viewer]
        password:
          type: string
          format: password
          minLength: 8

    # Setup Keys
    SetupKey:
      type: object
      properties:
        type:
          type: string
          enum: [jwt-secret, agent-jwt-secret]
          description: The key type
        exists:
          type: boolean
          description: Whether the key has been generated

    # Registration Tokens
    RegistrationToken:
      type: object
      properties:
        id:
          type: integer
          format: int64
        token:
          type: string
          description: Masked token (first 8 + last 4 chars)
        description:
          type: string
        created_at:
          type: string
          format: date-time
        used_at:
          type: string
          format: date-time
          nullable: true
        used_by_hostname:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, used, revoked]
        is_revoked:
          type: integer
          description: "1 if revoked, 0 otherwise"

    GenerateRegistrationTokenRequest:
      type: object
      properties:
        description:
          type: string
          maxLength: 255
          description: Optional description for the token

    GenerateRegistrationTokenResponse:
      type: object
      properties:
        full_token:
          type: string
          description: Full unmasked token (only shown once at creation)
        description:
          type: string
        created_at:
          type: string
          format: date-time

    # Log Settings
    LogSettings:
      type: object
      properties:
        retention_days:
          type: integer
          description: Number of days to retain logs
        retention_label:
          type: string
          description: Human-readable retention period label
        log_count:
          type: integer
          description: Total number of log entries
        estimated_size_mb:
          type: integer
          description: Estimated database size in MB
        logs_db_path:
          type: string
          description: Path to the logs database file

    UpdateLogRetentionRequest:
      type: object
      required:
      - retention_days
      properties:
        retention_days:
          type: integer
          minimum: 1
          maximum: 365
          description: Number of days to retain logs

    InstanceSettings:
      type: object
      properties:
        control_plane_port:
          type: integer
          description: The port the control plane listens on
        cert_file:
          type: string
          description: Path to TLS certificate file
        key_file:
          type: string
          description: Path to TLS key file
        db_path:
          type: string
          description: Path to SQLite database file
        downloads_dir:
          type: string
          description: Directory for agent binary downloads
        logs_db_path:
          type: string
          description: Path to the firewall logs database

    # Alerts
    Alert:
      type: object
      description: Alias for AlertHistory — represents a triggered alert record
      properties:
        id:
          type: integer
          format: uint
        rule_id:
          type: integer
          format: uint
        alert_type:
          type: string
          enum: [peer_offline, bundle_failed, blocked_spike, peer_online, new_peer, bundle_deployed]
        peer_id:
          type: integer
          nullable: true
        peer_hostname:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        subject:
          type: string
        message:
          type: string
        metadata:
          type: string
          description: JSON string for additional context
        status:
          type: string
          enum: [pending, sent, failed, throttled]
        sent_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    AlertRule:
      type: object
      properties:
        id:
          type: integer
          format: uint
        name:
          type: string
          maxLength: 255
        alert_type:
          type: string
          enum: [peer_offline, bundle_failed, blocked_spike, peer_online, new_peer, bundle_deployed]
        enabled:
          type: boolean
        threshold_value:
          type: integer
          description: Threshold value (e.g., blocked count for spike)
        threshold_window_minutes:
          type: integer
          description: Time window for threshold evaluation
        peer_id:
          type: integer
          nullable: true
          description: Peer ID if rule applies to a specific peer (null = all peers)
        throttle_minutes:
          type: integer
          description: Minimum time between alerts for this rule
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAlertRuleRequest:
      type: object
      required:
      - name
      - alert_type
      properties:
        name:
          type: string
          maxLength: 255
        alert_type:
          type: string
          enum: [peer_offline, bundle_failed, blocked_spike, peer_online, new_peer, bundle_deployed]
        enabled:
          type: boolean
          default: true
        threshold_value:
          type: integer
          default: 0
        threshold_window_minutes:
          type: integer
          minimum: 1
          default: 5
        peer_id:
          type: integer
          nullable: true
          description: Peer ID if rule applies to a specific peer
        throttle_minutes:
          type: integer
          minimum: 0
          default: 15

    UpdateAlertRuleRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        alert_type:
          type: string
          enum: [peer_offline, bundle_failed, blocked_spike, peer_online, new_peer, bundle_deployed]
        enabled:
          type: boolean
        threshold_value:
          type: integer
          minimum: 0
        threshold_window_minutes:
          type: integer
          minimum: 1
        peer_id:
          type: integer
          nullable: true
        throttle_minutes:
          type: integer
          minimum: 0

    AlertHistory:
      type: object
      properties:
        id:
          type: integer
          format: uint
        rule_id:
          type: integer
          format: uint
        alert_type:
          type: string
          enum: [peer_offline, bundle_failed, blocked_spike, peer_online, new_peer, bundle_deployed]
        peer_id:
          type: integer
          nullable: true
        peer_hostname:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        subject:
          type: string
        message:
          type: string
        metadata:
          type: string
          description: JSON string for additional context
        status:
          type: string
          enum: [pending, sent, failed, throttled]
        sent_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    SMTPConfig:
      type: object
      properties:
        host:
          type: string
          maxLength: 255
        port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
          maxLength: 255
        use_tls:
          type: boolean
          default: true
        from_address:
          type: string
          format: email
          maxLength: 255
        enabled:
          type: boolean
          default: false

    UpdateSMTPConfigRequest:
      type: object
      required:
      - host
      - port
      - from_address
      properties:
        host:
          type: string
          maxLength: 255
        port:
          type: integer
          minimum: 1
          maximum: 65535
        username:
          type: string
          maxLength: 255
        password:
          type: string
          format: password
          description: SMTP password (write-only, never returned in responses)
        use_tls:
          type: boolean
          default: true
        from_address:
          type: string
          format: email
          maxLength: 255
        enabled:
          type: boolean

    NotificationPreferences:
      type: object
      properties:
        id:
          type: integer
          format: uint
        user_id:
          type: integer
          format: uint
        enabled_alerts:
          type: string
          description: JSON array of alert types (empty means all enabled)
        quiet_hours_enabled:
          type: boolean
          default: false
        quiet_hours_start:
          type: string
          description: Start time in HH:MM format
          maxLength: 5
        quiet_hours_end:
          type: string
          description: End time in HH:MM format
          maxLength: 5
        quiet_hours_timezone:
          type: string
          maxLength: 50
        digest_enabled:
          type: boolean
          default: false
        digest_frequency:
          type: string
          enum: [daily, weekly]
          default: daily
        digest_time:
          type: string
          description: Time in HH:MM format
          maxLength: 5
          default: "09:00"
        digest_timezone:
          type: string
          maxLength: 50
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateNotificationPreferencesRequest:
      type: object
      properties:
        enabled_alerts:
          type: string
          description: JSON array of alert types
        quiet_hours_enabled:
          type: boolean
        quiet_hours_start:
          type: string
          maxLength: 5
        quiet_hours_end:
          type: string
          maxLength: 5
        quiet_hours_timezone:
          type: string
          maxLength: 50
        digest_enabled:
          type: boolean
        digest_frequency:
          type: string
          enum: [daily, weekly]
        digest_time:
          type: string
          maxLength: 5
        digest_timezone:
          type: string
          maxLength: 50

