openapi: 3.0.3
info:
  title: Runic API
  description: |
    Firewall rule management system API.
    
    ## Authentication
    Most endpoints require Bearer token authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <token>
    ```
    
    ## Error Responses
    All endpoints may return error responses in the following format:
    ```json
    {
      "error": "error message"
    }
    ```
    
    Common HTTP status codes:
    - 400: Bad Request - Invalid input
    - 401: Unauthorized - Missing or invalid token
    - 403: Forbidden - Insufficient permissions
    - 404: Not Found - Resource not found
    - 409: Conflict - Resource in use
    - 500: Internal Server Error
  version: 1.0.0
  contact:
    name: Runic Support
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server
  - url: /api/v1
    description: Production server (relative path)

tags:
  - name: Peers
    description: Peer management endpoints
  - name: Groups
    description: Group management endpoints
  - name: Services
    description: Service management endpoints
  - name: Policies
    description: Policy management endpoints
  - name: Auth
    description: Authentication endpoints
  - name: Dashboard
    description: Dashboard and statistics endpoints
  - name: Pending Changes
    description: Pending change approval endpoints

paths:
  # ==================== PEERS ====================
  /peers:
    get:
      tags:
        - Peers
      summary: List all peers
      description: Returns a list of all peers with their status, groups, and metadata.
      operationId: listPeers
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Peer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []
    post:
      tags:
        - Peers
      summary: Create a new peer
      description: |
        Creates a new peer (agent or manual).
        
        For agent peers, `agent_key` is required.
        For manual peers, `hostname` and `ip_address` are required.
      operationId: createPeer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePeerRequest'
      responses:
        '201':
          description: Peer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                    example: 123
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /peers/{id}:
    get:
      tags:
        - Peers
      summary: Get peer by ID
      description: Returns detailed information about a specific peer.
      operationId: getPeer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Peer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []
    put:
      tags:
        - Peers
      summary: Update peer
      description: Updates an existing manual peer. Only manual peers can be edited.
      operationId: updatePeer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePeerRequest'
      responses:
        '200':
          description: Peer updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "peer updated"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []
    delete:
      tags:
        - Peers
      summary: Delete peer
      description: Deletes a peer after checking policy constraints.
      operationId: deletePeer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Peer deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Peer deleted"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /peers/{id}/bundle:
    get:
      tags:
        - Peers
      summary: Get peer bundle
      description: |
        Returns the compiled iptables rules for a peer.
        Rules are compiled on-demand to ensure current effective rules.
      operationId: getPeerBundle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                    description: The compiled iptables rules
                    example: "# Generated by Runic\n-A INPUT -p tcp --dport 22 -j ACCEPT"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /peers/{id}/compile:
    post:
      tags:
        - Peers
      summary: Compile peer rules
      description: Compiles and stores rules for a peer.
      operationId: compilePeer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Rules compiled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "v1.0.0"
                  hmac:
                    type: string
                    example: "abc123..."
                  size:
                    type: integer
                    example: 2048
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  /peers/{id}/rotate-key:
    post:
      tags:
        - Peers
      summary: Rotate peer key
      description: Rotates the HMAC key for a peer.
      operationId: rotatePeerKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Key rotated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "key rotated"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - BearerAuth: []

  # ==================== GROUPS ====================
