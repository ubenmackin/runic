    TestEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    # Special Targets
    SpecialTarget:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [any, lan, multicast, broadcast]

    # Policy Preview
    PolicyPreviewRequest:
      type: object
      required:
      - source_id
      - source_type
      - service_id
      - target_id
      - target_type
      - action
      properties:
        source_id:
          type: integer
          format: int64
        source_type:
          type: string
          enum: [peer, group, special]
        service_id:
          type: integer
          format: int64
        target_id:
          type: integer
          format: int64
        target_type:
          type: string
          enum: [peer, group, special]
        action:
          type: string
          enum: [ACCEPT, DROP, LOG_DROP]
        priority:
          type: integer
          default: 1000
        enabled:
          type: boolean
          default: true
        target_scope:
          type: string
          enum: [both, host, docker]
          default: both
        direction:
          type: string
          enum: [both, forward, backward]
          default: both

    PolicyPreviewResult:
      type: object
      properties:
        expanded_rules:
          type: array
          items:
            type: object
            properties:
              source_ip:
                type: string
              target_ip:
                type: string
              service:
                type: string
              action:
                type: string
              chain:
                type: string
              direction:
                type: string
        total_rules:
          type: integer

