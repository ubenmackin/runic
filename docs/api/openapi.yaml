  # ==================== AUTH ====================
  /setup:
    get:
      tags:
      - Auth
      summary: Get setup status
      description: |
        Returns whether initial setup has been completed.
        This endpoint does not require authentication.
      operationId: getSetupStatus
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_setup:
                    type: boolean
                    example: false
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
      - Auth
      summary: Complete initial setup
      description: |
        Completes the initial setup by creating the admin user and JWT secret.
        This endpoint does not require authentication and can only be called once.
      operationId: completeSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupRequest'
      responses:
        '200':
          description: Setup completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "setup complete"
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: Authenticates user and returns access/refresh tokens.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "runic_access_token=...; HttpOnly; Path=/"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "login successful"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: User logout
      description: Clears authentication cookies and invalidates session.
      operationId: logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "logged out"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh access token
      description: |
        Refreshes the access token using a valid refresh token.
        The refresh token is read from cookies.
      operationId: refreshToken
      responses:
        '200':
          description: Token refreshed successfully
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "runic_access_token=...; HttpOnly; Path=/"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "token refreshed"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      tags:
      - Auth
      summary: Get current user info
      description: Returns the authenticated user's profile information.
      operationId: getMe
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
      - BearerAuth: []

  /auth/verify:
    get:
      tags:
        - Auth
      summary: Verify token
      description: Verifies if the current token is valid.
      operationId: verifyToken
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== DASHBOARD ====================
  /dashboard:
    get:
