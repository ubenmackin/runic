<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<style type="text/css">
/* Force dark mode in email clients */
:root { color-scheme: dark; }
body { background-color: #0a0a0a !important; }
</style>
<title>{{.Subject}}</title>
</head>
<body style="background-color: #0a0a0a; padding: 40px 20px; margin: 0; font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace;">

<!-- Main Container -->
<div style="max-width: 600px; margin: 0 auto; background-color: #121212; border: 1px solid #2d2d2d; color: #d1d5db; line-height: 1.6;">

  <!-- Header -->
  <div style="padding: 20px;">
    <div style="border-bottom: 1px dashed #4b5563; padding-bottom: 15px; color: #a855f7; font-size: 12px; font-weight: bold; letter-spacing: 2px;">
      [ RUNIC // SYSTEM ALERT ]
    </div>
  </div>

  <!-- Alert Summary (Badge + Title) -->
  <div style="padding: 0 20px;">
    <div style="margin-bottom: 15px;">
      <!-- Severity badge: bracketed with border -->
      <span style="color: #a855f7; border: 1px solid #a855f7; padding: 2px 8px; font-size: 11px; font-weight: bold; margin-right: 10px; display: inline-block;">[ {{if .AlertType}}{{.AlertType}}{{end}} ]</span>
      <span style="font-size: 16px; font-weight: bold; color: #f3f4f6;">{{.Subject}}</span>
    </div>

    <!-- Message body -->
    <div style="font-size: 13px; color: #e5e7eb; margin-bottom: 20px;">
      {{.Message}}
    </div>
  </div>

  <!-- Details Data Table (rendered by DetailsHTML) -->
  {{if .HasDetails}}
  <div style="padding: 0 20px 20px 20px;">
    {{.DetailsHTML}}
  </div>
  {{end}}

  <!-- Footer -->
  <div style="background-color: #0d0d0d; border-top: 1px solid #2d2d2d; padding: 20px; text-align: center;">
    <div style="font-size: 11px; color: #6b7280;">
      This is an automated alert from <span style="color: #a855f7; font-weight: bold;">Runic</span>.
      <br><br>
      <a href="{{.ManageAlertsURL}}" style="color: #d97706; text-decoration: none; border-bottom: 1px dashed #d97706; padding-bottom: 2px;">Manage notification preferences</a>
    </div>
  </div>

</div>
</body>
</html>
